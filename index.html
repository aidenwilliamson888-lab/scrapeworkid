<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>📊 OpenLibrary Trending via API</title>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background:linear-gradient(145deg, #0b1f2c 0%, #1a3440 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.scraper-card { max-width:1200px; width:100%; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-radius:40px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.4); border:2px solid rgba(255,170,51,0.5); }
.header { background:linear-gradient(135deg, #102a36 0%, #1d3e4f 100%); padding:30px; text-align:center; border-bottom:5px solid #ffaa33; }
.header h1 { color:white; font-size:2.5rem; font-weight:800; margin-bottom:10px; }
.header p { color:#ffaa33; font-size:1.2rem; }
.content { padding:30px; }
.panel { background:#f8faff; padding:25px; border-radius:25px; border:2px solid #e0e8f0; margin-bottom:20px; }
.panel h2 { color:#0b1f2c; margin-bottom:20px; font-size:1.5rem; border-left:8px solid #ffaa33; padding-left:15px; }
.btn-primary { background:#ffaa33; border:none; border-radius:60px; padding:12px 25px; font-size:1.1rem; font-weight:800; color:#0b1f2c; cursor:pointer; box-shadow:0 6px 0 #b87d1f; transition:all 0.2s; display:inline-flex; align-items:center; gap:10px; margin-right:10px; }
.btn-primary:hover { transform:translateY(-3px); box-shadow:0 9px 0 #b87d1f; background:#ffb852; }
.btn-primary:active { transform:translateY(3px); box-shadow:0 3px 0 #b87d1f; }
.btn-secondary { background:#1d3e4f; border:none; border-radius:60px; padding:12px 25px; font-size:1.1rem; font-weight:800; color:white; cursor:pointer; box-shadow:0 6px 0 #0b1f2c; transition:all 0.2s; display:inline-flex; align-items:center; gap:10px; }
.btn-secondary:hover { transform:translateY(-3px); box-shadow:0 9px 0 #0b1f2c; background:#2a5066; }
.btn-secondary:active { transform:translateY(3px); box-shadow:0 3px 0 #0b1f2c; }
.result-box { background:white; border-radius:15px; padding:20px; margin-top:20px; border:2px dashed #ffaa33; }
.result-box textarea { width:100%; height:250px; border:none; font-family:monospace; font-size:0.9rem; padding:10px; background:#f5f5f5; border-radius:10px; resize:vertical; }
.book-list { max-height:400px; overflow-y:auto; margin-top:15px; display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:10px; }
.book-item { display:flex; align-items:center; gap:10px; padding:10px; background:white; border-radius:10px; border:1px solid #eee; }
.book-item:hover { background:#fff0d4; border-color:#ffaa33; }
.book-item img { width:40px; height:60px; object-fit:cover; border-radius:5px; }
.book-info { flex:1; }
.book-title { font-weight:600; color:#0b1f2c; font-size:0.9rem; }
.book-author { font-size:0.8rem; color:#666; }
.book-id { font-size:0.75rem; color:#ffaa33; font-family:monospace; }
.loading { text-align:center; padding:30px; }
.loading i { font-size:2rem; color:#ffaa33; margin-bottom:10px; }
.footer { background:#0b1f2c; padding:20px; color:#8ba0b0; text-align:center; border-top:2px solid #ffaa33; }
.filter-bar { display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
.filter-bar select, .filter-bar input { padding:10px; border:2px solid #ccddee; border-radius:8px; font-size:0.9rem; }
.filter-bar select:focus, .filter-bar input:focus { outline:none; border-color:#ffaa33; }
</style>
</head>
<body>
<div class="scraper-card">
<div class="header">
<h1><i class="fas fa-chart-line"></i> OpenLibrary Trending via API</h1>
<p>Mengambil data real-time dari Search API OpenLibrary</p>
</div>

<div class="content">
<div class="panel">
<h2><i class="fas fa-sliders-h"></i> Filter Trending</h2>

<div class="filter-bar">
<select id="sortBy">
<option value="want_to_read">📚 Paling Banyak Diinginkan</option>
<option value="already_read">✅ Paling Banyak Dibaca</option>
<option value="currently_reading">📖 Sedang Dibaca</option>
<option value="new">🆕 Terbaru</option>
</select>

<select id="timeRange">
<option value="now">🔥 Trending Now</option>
<option value="day">Hari Ini</option>
<option value="week">Minggu Ini</option>
<option value="month">Bulan Ini</option>
</select>

<input type="number" id="limit" value="50" min="10" max="100" step="10" style="width:80px;">

<button class="btn-primary" id="fetchTrendingBtn">
<i class="fas fa-sync-alt"></i> Ambil Trending
</button>

<button class="btn-secondary" id="nextPageBtn" disabled>
<i class="fas fa-arrow-right"></i> Halaman Selanjutnya
</button>
</div>

<div id="trendingContainer">
<div class="loading" id="loadingTrending">
<i class="fas fa-spinner fa-pulse"></i>
<p>Klik "Ambil Trending" untuk memulai</p>
</div>
</div>
</div>

<div class="panel">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
<h2 style="border-left:8px solid #ffaa33; padding-left:15px; margin:0;"><i class="fas fa-barcode"></i> Work ID Results</h2>
<div>
<button class="btn-secondary" id="copyToClipboard">
<i class="fas fa-copy"></i> Copy
</button>
<button class="btn-secondary" id="clearResults">
<i class="fas fa-trash"></i> Clear
</button>
</div>
</div>

<div class="result-box">
<textarea id="workIdOutput" placeholder="Work ID akan muncul di sini..."></textarea>
</div>
<div id="countInfo" style="margin-top:10px; font-size:0.9rem; color:#666; text-align:right;"></div>
</div>

<!-- Kirim ke PDF Generator -->
<div style="background:#fff0d4; padding:20px; border-radius:20px; margin-top:20px;">
<h3 style="color:#0b1f2c; margin-bottom:15px;"><i class="fas fa-file-pdf"></i> Kirim ke PDF Generator</h3>
<button class="btn-primary" id="sendToGenerator">
<i class="fas fa-arrow-right"></i> Gunakan Work ID untuk Generate PDF
</button>
</div>
</div>

<div class="footer">
<i class="fas fa-open-library"></i> Data dari OpenLibrary Search API • Work ID siap pakai
</div>
</div>

<script>
// ===== ELEMENTS =====
const trendingContainer = document.getElementById('trendingContainer');
const workIdOutput = document.getElementById('workIdOutput');
const countInfo = document.getElementById('countInfo');
const fetchBtn = document.getElementById('fetchTrendingBtn');
const nextPageBtn = document.getElementById('nextPageBtn');
const copyBtn = document.getElementById('copyToClipboard');
const clearBtn = document.getElementById('clearResults');
const sendBtn = document.getElementById('sendToGenerator');
const sortBy = document.getElementById('sortBy');
const timeRange = document.getElementById('timeRange');
const limit = document.getElementById('limit');

// ===== VARIABEL GLOBAL =====
let currentPage = 1;
let totalResults = 0;
let allWorkIds = [];

// ===== FUNGSI FETCH DARI OPENLIBRARY API =====
async function fetchTrending(page = 1, append = false) {
trendingContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Mengambil data trending...</p></div>';

try {
// Mapping sort ke parameter OpenLibrary
const sortMapping = {
'want_to_read': 'want_to_read',
'already_read': 'already_read',
'currently_reading': 'currently_reading',
'new': 'new'
};

// Mapping time range
const timeMapping = {
'now': 'now',
'day': 'day',
'week': 'week',
'month': 'month'
};

// URL API OpenLibrary
const apiUrl = `https://openlibrary.org/search.json?sort=${sortMapping[sortBy.value]}&time_range=${timeMapping[timeRange.value]}&limit=${limit.value}&page=${page}`;

const response = await fetch(apiUrl);
if (!response.ok) throw new Error(`HTTP ${response.status}`);

const data = await response.json();

if (data.docs && data.docs.length > 0) {
const books = data.docs.map(doc => ({
workId: doc.key.replace('/works/', ''),
title: doc.title || 'Unknown Title',
author: doc.author_name ? doc.author_name[0] : 'Unknown Author',
coverId: doc.cover_i,
year: doc.first_publish_year || 'Unknown'
}));

// Tampilkan buku
let html = '<div class="book-list">';
books.slice(0, 20).forEach(book => {
const coverUrl = book.coverId ? `https://covers.openlibrary.org/b/id/${book.coverId}-S.jpg` : 'https://covers.openlibrary.org/b/id/12389591-S.jpg';
html += `
<div class="book-item">
<img src="${coverUrl}" onerror="this.src='https://covers.openlibrary.org/b/id/12389591-S.jpg'">
<div class="book-info">
<div class="book-title">${book.title.substring(0, 60)}${book.title.length > 60 ? '...' : ''}</div>
<div class="book-author">${book.author} (${book.year})</div>
<div class="book-id">${book.workId}</div>
</div>
</div>
`;
});
html += '</div>';
trendingContainer.innerHTML = html;

// Update Work IDs
const newWorkIds = books.map(b => b.workId);

if (append) {
allWorkIds = [...new Set([...allWorkIds, ...newWorkIds])];
} else {
allWorkIds = newWorkIds;
}

updateWorkIdOutput();

// Update pagination
currentPage = page;
totalResults = data.numFound || 0;
nextPageBtn.disabled = books.length < limit.value;

} else {
trendingContainer.innerHTML = '<div class="status">❌ Tidak ada data ditemukan</div>';
}

} catch (error) {
console.error(error);
trendingContainer.innerHTML = `<div class="status">❌ Error: ${error.message}</div>`;
}
}

// ===== UPDATE TEXTAREA =====
function updateWorkIdOutput() {
workIdOutput.value = allWorkIds.join('\n');
countInfo.innerHTML = `📊 Total: ${allWorkIds.length} Work ID unik (dari ${totalResults} hasil)`;
}

// ===== COPY TO CLIPBOARD =====
function copyToClipboard() {
if (allWorkIds.length > 0) {
navigator.clipboard.writeText(allWorkIds.join('\n')).then(() => {
alert(`✅ ${allWorkIds.length} Work ID berhasil di-copy!`);
}).catch(() => {
alert('❌ Gagal copy, coba manual');
});
} else {
alert('Tidak ada Work ID untuk di-copy');
}
}

// ===== EVENT LISTENERS =====
fetchBtn.addEventListener('click', () => {
currentPage = 1;
fetchTrending(1, false);
});

nextPageBtn.addEventListener('click', () => {
fetchTrending(currentPage + 1, true);
});

copyBtn.addEventListener('click', copyToClipboard);

clearBtn.addEventListener('click', () => {
workIdOutput.value = '';
allWorkIds = [];
countInfo.innerHTML = '📊 Total: 0 Work ID';
});

sendBtn.addEventListener('click', () => {
if (allWorkIds.length > 0) {
localStorage.setItem('trendingWorkIds', JSON.stringify(allWorkIds));
alert(`✅ ${allWorkIds.length} Work ID disimpan! Buka PDF Generator dan gunakan.`);
window.open('generator.html', '_blank');
} else {
alert('Tidak ada Work ID untuk dikirim');
}
});

// ===== LOAD PERTAMA =====
fetchTrending(1, false);
</script>
</body>
</html>
